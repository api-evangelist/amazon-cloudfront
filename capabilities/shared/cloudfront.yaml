naftiko: "1.0.0-alpha1"

info:
  label: "Amazon CloudFront"
  description: "API for managing CloudFront distributions, origins, behaviors, cache policies, and edge functions for global content delivery."
  tags:
    - Amazon Web Services
    - Amazon CloudFront
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: cloudfront
      baseUri: https://cloudfront.amazonaws.com
      description: "Amazon CloudFront API."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources: []

  exposes:
    - type: rest
      port: 8100
      namespace: cloudfront-rest
      resources: []

    - type: mcp
      port: 9100
      namespace: cloudfront-mcp
      transport: http
      tools: []
